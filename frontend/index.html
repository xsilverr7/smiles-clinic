<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Smiles Clínica Dental</title><link rel="stylesheet" href="styles.css"></head><body><header><h1>SMILES</h1><p>Clínica Dental - Sistema de Gestión de Citas</p></header><nav><button onclick="show('inicio')">Inicio</button><button onclick="show('pacientes')">Pacientes</button><button onclick="show('dentistas')">Dentistas</button><button onclick="show('citas')">Citas</button><button onclick="show('consultas')">Consultas</button></nav><main>
<section id="inicio" class="page active"><h2>Panel Administrativo</h2><div id="resumen" class="cards"></div></section>
<section id="pacientes" class="page"><h2>Gestión de Pacientes</h2><form id="formPaciente"><input name="nombreCompleto" placeholder="Nombre completo" required><input name="edad" type="number" placeholder="Edad" required><input name="telefono" placeholder="Teléfono" required><input name="correo" type="email" placeholder="Correo electrónico" required><input name="direccion" placeholder="Dirección" required><button>Guardar paciente</button></form><div id="listaPacientes"></div></section>
<section id="dentistas" class="page"><h2>Gestión de Dentistas</h2><form id="formDentista"><input name="nombre" placeholder="Nombre" required><input name="especialidad" placeholder="Especialidad" required><input name="telefono" placeholder="Teléfono" required><input name="correo" type="email" placeholder="Correo" required><input name="horarioAtencion" placeholder="Horario de atención" required><button>Guardar dentista</button></form><div id="listaDentistas"></div></section>
<section id="citas" class="page"><h2>Gestión de Citas</h2><form id="formCita"><select name="paciente" id="selPaciente" required></select><select name="dentista" id="selDentista" required></select><input name="fecha" type="date" required><input name="hora" type="time" required><input name="motivo" placeholder="Motivo de consulta" required><select name="estado"><option>Programada</option><option>Confirmada</option><option>Atendida</option><option>Cancelada</option></select><button>Agendar cita</button></form><div id="listaCitas"></div></section>
<section id="consultas" class="page"><h2>Consultas Avanzadas</h2><div class="query"><input id="fechaConsulta" type="date"><button onclick="citasDia()">Citas de un día</button><button onclick="pacientesRecientes()">Pacientes recientes</button><button onclick="citasCanceladas()">Citas canceladas</button><button onclick="citasPorDentista()">Cantidad por dentista</button><input id="especialidadConsulta" placeholder="Especialidad"><button onclick="citasPorEspecialidad()">Citas por especialidad</button></div><div id="resultados"></div></section>
</main><script src="app.js"></script></body></html>
